<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P File Sharing</title>
    <style>
        :root {
            --primary: #E4568B;
            --secondary: #5D7B3D;
            --accent: #F6C94D;
            --background: #A7C7E4;
            --soft-accent: #F29BB9;
            --text-dark: #2A2A2A;
            --page-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url("/image.png") center/cover no-repeat fixed;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: center;
            padding: 3.5rem 3rem;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(93, 123, 61, 0.1);
            border: 4px solid var(--background);
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            font-weight: 800;
            color: var(--secondary);
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--secondary);
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 3rem;
            opacity: 0.85;
        }

        .cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .card {
            background: var(--background);
            border: 2px solid var(--background);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 260px;
            text-decoration: none;
            color: var(--text-dark);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(167, 199, 228, 0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 6px;
        }
        .card.upload::before { background: var(--primary); }
        .card.download::before { background: var(--accent); }

        .card:hover {
            box-shadow: 0 20px 35px rgba(228, 86, 139, 0.2);
            border-color: var(--soft-accent);
            background: #ffffff;
            transform: translateY(-8px) scale(1.02);
        }

        .card:active { transform: translateY(2px); }

        .card-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            background: #ffffff;
            color: var(--secondary);
            border-radius: 20px;
            margin-bottom: 1.25rem;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 10px rgba(167, 199, 228, 0.5);
        }

        .card:hover .card-icon {
            transform: scale(1.1) rotate(5deg);
            color: var(--primary);
        }

        /* SVG Icons */
        .icon-svg {
            width: 36px;
            height: 36px;
            stroke-width: 2.5;
            stroke: currentColor;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .card h2 {
            font-size: 1.4rem;
            margin-bottom: 0.75rem;
            font-weight: 800;
            color: var(--secondary);
        }

        .card p {
            font-size: 0.95rem;
            color: var(--text-dark);
            opacity: 0.8;
            line-height: 1.5;
            font-weight: 500;
        }

        .peer-info {
            margin-top: 3.5rem;
            font-size: 0.9rem;
            color: var(--secondary);
            display: inline-block;
            background: var(--page-bg);
            border: 2px dashed var(--background);
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>P2P File Sharing</h1>
        <p class="subtitle">Select an operation to manage network files</p>

        <div class="cards">
            <a href="/upload" class="card upload">
                <div class="card-icon">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                </div>
                <h2>Upload File</h2>
                <p>Segment and distribute a local file to the network infrastructure.</p>
            </a>

            <a href="/download" class="card download">
                <div class="card-icon">
                    <svg class="icon-svg" viewBox="0 0 24 24">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </div>
                <h2>Download File</h2>
                <p>Retrieve and assemble chunks from distributed network peers.</p>
            </a>
        </div>

        <p class="peer-info">Node Status: Connected to the P2P Swarm</p>
    </div>
</body>
</html>
