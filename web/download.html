<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P File Download</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
        .container { border: 1px solid #ccc; padding: 2rem; border-radius: 8px; }
        h1 { margin-top: 0; }
        h3 { margin-bottom: 0.5rem; }
        button { background: #007bff; color: white; border: none; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; margin-bottom: 1rem; }
        button:hover { background: #0056b3; }
        .file-card { border: 1px solid #ddd; padding: 1rem; margin-bottom: 0.5rem; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .file-info { flex: 1; }
        .file-info strong { display: block; }
        .file-info small { color: #666; }
        .download-btn { background: #28a745; font-size: 0.9rem; }
        .download-btn:hover { background: #218838; }
        #status { margin-top: 1rem; padding: 0.5rem; border-radius: 4px; display: none; }
        .status-success { background: #d4edda; color: #155724; display: block !important; }
        .status-error { background: #f8d7da; color: #721c24; display: block !important; }
        .status-loading { background: #cce5ff; color: #004085; display: block !important; }
        a { color: #007bff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        nav { margin-bottom: 1rem; }

        /* Chunk source visualization */
        #chunkDetails { margin-top: 1.5rem; display: none; }
        #chunkDetails.visible { display: block; }
        .peers-summary { margin-bottom: 1rem; }
        .peer-badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 12px; font-size: 0.8rem; font-weight: bold; margin-right: 0.4rem; margin-bottom: 0.3rem; color: white; }
        .chunk-grid { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 0.5rem; }
        .chunk-cell {
            width: 36px; height: 36px; border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: bold; color: white;
            cursor: default; position: relative;
        }
        .chunk-cell:hover::after {
            content: attr(data-tooltip);
            position: absolute; bottom: 110%; left: 50%; transform: translateX(-50%);
            background: #333; color: #fff; padding: 3px 8px; border-radius: 4px;
            font-size: 0.75rem; white-space: nowrap; z-index: 10;
        }
        .load-bar-container { margin-top: 0.5rem; }
        .load-bar-label { font-size: 0.85rem; margin-bottom: 2px; }
        .load-bar { height: 18px; border-radius: 4px; display: flex; overflow: hidden; background: #eee; }
        .load-bar-segment { height: 100%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <nav><a href="/">← Upload</a></nav>
        <h1>Download Files from Peers</h1>
        <button id="refreshBtn" onclick="browseFiles()">Refresh File List</button>
        <div id="fileList"></div>
        <div id="status"></div>

        <!-- Chunk source visualization -->
        <div id="chunkDetails">
            <h3>📊 Load Balancing Report</h3>
            <div id="peersSummary" class="peers-summary"></div>
            <div id="loadBar" class="load-bar-container"></div>
            <h3 style="margin-top: 1rem;">Chunk Map</h3>
            <div id="chunkGrid" class="chunk-grid"></div>
        </div>
    </div>

    <script>
        const statusDiv = document.getElementById('status');
        const fileListDiv = document.getElementById('fileList');
        const chunkDetailsDiv = document.getElementById('chunkDetails');

        // Color palette for peers
        const PEER_COLORS = ['#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#e67e22', '#34495e'];

        function setStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = 'status-' + type;
        }

        async function browseFiles() {
            fileListDiv.innerHTML = '';
            chunkDetailsDiv.classList.remove('visible');
            setStatus('Scanning peers for available files...', 'loading');
            try {
                const resp = await fetch('/api/browse');
                if (!resp.ok) throw new Error(await resp.text());
                const files = await resp.json();
                statusDiv.style.display = 'none';

                if (!files || files.length === 0) {
                    fileListDiv.innerHTML = '<p>No files found on any peers. Make sure peers are running and have shared files.</p>';
                    return;
                }

                files.forEach(f => {
                    const card = document.createElement('div');
                    card.className = 'file-card';
                    card.innerHTML = `
                        <div class="file-info">
                            <strong>${f.file_name}</strong>
                            <small>Size: ${formatSize(f.file_size)} | Chunks: ${f.total_chunks} | Available on ${f.peers_count} peer(s)</small>
                        </div>
                        <button class="download-btn" onclick="downloadFile('${f.file_name}', '${f.peer_address}')">Download</button>
                    `;
                    fileListDiv.appendChild(card);
                });
            } catch(err) {
                setStatus('Error: ' + err.message, 'error');
            }
        }

        async function downloadFile(name, peer) {
            chunkDetailsDiv.classList.remove('visible');
            setStatus(`Downloading "${name}" from ${peer}...`, 'loading');
            try {
                const resp = await fetch(`/api/download?name=${encodeURIComponent(name)}&peer=${encodeURIComponent(peer)}`);
                const data = await resp.json();
                if (!resp.ok) throw new Error(data.error || JSON.stringify(data));

                setStatus(`✅ Downloaded "${data.file_name}" (${formatSize(data.file_size)}) → ${data.saved_to}`, 'success');

                // Show chunk source visualization
                if (data.chunk_sources && data.chunk_sources.length > 0) {
                    renderChunkDetails(data.chunk_sources, data.peers_used);
                }
            } catch(err) {
                setStatus('Download failed: ' + err.message, 'error');
            }
        }

        function renderChunkDetails(chunkSources, peersUsed) {
            // Assign colors to peers
            const peerColorMap = {};
            peersUsed.forEach((p, i) => {
                peerColorMap[p] = PEER_COLORS[i % PEER_COLORS.length];
            });

            // Count chunks per peer
            const peerCounts = {};
            chunkSources.forEach(cs => {
                peerCounts[cs.peer_address] = (peerCounts[cs.peer_address] || 0) + 1;
            });
            const totalChunks = chunkSources.length;

            // Peers summary badges
            const summaryDiv = document.getElementById('peersSummary');
            summaryDiv.innerHTML = '<strong>Peers used:</strong> ';
            peersUsed.forEach(p => {
                const count = peerCounts[p] || 0;
                const pct = ((count / totalChunks) * 100).toFixed(0);
                summaryDiv.innerHTML += `<span class="peer-badge" style="background:${peerColorMap[p]}">${p} — ${count} chunks (${pct}%)</span> `;
            });

            // Load bar
            const loadBarDiv = document.getElementById('loadBar');
            loadBarDiv.innerHTML = '<div class="load-bar-label"><strong>Load distribution:</strong></div><div class="load-bar" id="loadBarInner"></div>';
            const barInner = document.getElementById('loadBarInner');
            peersUsed.forEach(p => {
                const count = peerCounts[p] || 0;
                const pct = ((count / totalChunks) * 100).toFixed(1);
                const seg = document.createElement('div');
                seg.className = 'load-bar-segment';
                seg.style.width = pct + '%';
                seg.style.background = peerColorMap[p];
                seg.textContent = count > 0 ? count : '';
                seg.title = `${p}: ${count} chunks (${pct}%)`;
                barInner.appendChild(seg);
            });

            // Chunk grid — sort by index
            const sorted = [...chunkSources].sort((a, b) => a.chunk_index - b.chunk_index);
            const gridDiv = document.getElementById('chunkGrid');
            gridDiv.innerHTML = '';
            sorted.forEach(cs => {
                const cell = document.createElement('div');
                cell.className = 'chunk-cell';
                cell.style.background = peerColorMap[cs.peer_address];
                cell.textContent = cs.chunk_index;
                cell.setAttribute('data-tooltip', `Chunk ${cs.chunk_index} ← ${cs.peer_address}`);
                gridDiv.appendChild(cell);
            });

            chunkDetailsDiv.classList.add('visible');
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / 1048576).toFixed(1) + ' MB';
        }

        // Auto-load on page open
        browseFiles();
    </script>
</body>
</html>
